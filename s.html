<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>বাকি হিসাব ৩.০ - হাই সিকিউর ড্যাশবোর্ড</title>
    <style>
        :root { --primary: #800000; --bg: #f4f4f9; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        /* লগইন ডিজাইন */
        .login-box { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        .login-box h2 { color: var(--primary); margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #a00000; }

        /* ড্যাশবোর্ড এরিয়া */
        #content-area { display: none; width: 100%; max-width: 1100px; margin: 20px; }
        .tab-wrapper { display: flex; gap: 5px; margin-bottom: 10px; }
        .tab-btn { flex: 1; padding: 12px; border: none; cursor: pointer; background: #ddd; border-radius: 8px; font-weight: bold; }
        .tab-btn.active { background: var(--primary); color: white; }
        
        .iframe-container { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.1); display: none; }
        .iframe-container.active { display: block; }
        iframe { border: none; width: 100%; height: 600px; }

        #msg { color: red; display: none; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="login-form" class="login-box">
        <h2>বাকি হিসাব ৩.০</h2>
        <input type="text" id="userid" placeholder="ইউজার আইডি">
        <input type="password" id="pass" placeholder="পাসওয়ার্ড">
        <button onclick="handleLogin()">লগইন করুন</button>
        <p id="msg">ভুল আইডি বা পাসওয়ার্ড!</p>
    </div>

    <div id="content-area">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h3 style="color: var(--primary); margin: 0;">ড্যাশবোর্ড - বাকি হিসাব ৩.০</h3>
            <button onclick="logout()" style="width: auto; padding: 5px 15px; background: #333;">লগ আউট</button>
        </div>

        <div class="tab-wrapper">
            <button class="tab-btn active" onclick="openTab(event, 'entry-tab')">তথ্য এন্ট্রি</button>
            <button class="tab-btn" onclick="openTab(event, 'report-tab')">লাইভ রিপোর্ট</button>
        </div>

        <div id="entry-tab" class="iframe-container active">
            <iframe src="https://script.google.com/macros/s/AKfycbyz90ERoZ4ThdAzUZuPq8BrrHH8eeLxmggfSrXlPJdnhACwNEOa5jlE8eFus0YYWPuO/exec"></iframe>
        </div>

        <div id="report-tab" class="iframe-container">
            <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vTGAqWU1mMKBzWoPMrF6HYgeOcafMWRFItRQH53QxwTKKiDTrnpBST0WwvQnJShzSpNTCY6Bl5m6FmY/pubhtml?chrome=false&amp;widget=true&amp;headers=false"></iframe>
        </div>
    </div>

    <script>
        // আপনার পাসওয়ার্ড "66850" এর SHA-256 হ্যাশ
        const SE_HASH = "706d8713508365451950d604e384c26425316492d535e69e7100808e6f114e9d";

        // সেশন চেক
        if (sessionStorage.getItem("authenticated") === "true") {
            showDashboard();
        }

        async function handleLogin() {
            const id = document.getElementById('userid').value;
            const p = document.getElementById('pass').value;
            
            // ইনপুট পাসওয়ার্ডকে হ্যাশে কনভার্ট করা
            const hash = await sha256(p);

            if (id === "admin" && hash === SE_HASH) {
                sessionStorage.setItem("authenticated", "true");
                showDashboard();
            } else {
                document.getElementById('msg').style.display = 'block';
            }
        }

        // SHA-256 এনক্রিপশন লজিক
        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        function showDashboard() {
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('content-area').style.display = 'block';
            document.body.style.alignItems = 'flex-start';
        }

        function openTab(evt, tabName) {
            var i, containers, tabs;
            containers = document.getElementsByClassName("iframe-container");
            for (i = 0; i < containers.length; i++) containers[i].style.display = "none";
            tabs = document.getElementsByClassName("tab-btn");
            for (i = 0; i < tabs.length; i++) tabs[i].classList.remove("active");
            document.getElementById(tabName).style.display = "block";
            evt.currentTarget.classList.add("active");
        }

        function logout() {
            sessionStorage.clear();
            location.reload();
        }

        // এন্টার বাটন সাপোর্ট
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') handleLogin();
        });
    </script>

</body>
</html>
