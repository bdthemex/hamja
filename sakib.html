<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>বাকি হিসাব ৩.০ - ড্যাশবোর্ড</title>
    <style>
        /* বেসিক স্টাইল */
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #ffffff; }
        
        /* লগইন বক্স */
        .login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #800000; display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-box { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); text-align: center; width: 90%; max-width: 350px; }
        .login-box h2 { color: #800000; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #800000; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }

        /* মেইন কন্টেন্ট এলাকা - ফুল উইথ */
        #main-dashboard { display: none; width: 100%; }
        
        /* এম্বেড কন্টেইনার - যা গুগল শীটের বাড়তি অংশ লুকিয়ে ফেলে */
        .sheet-container {
            width: 100%;
            height: 90vh; /* স্ক্রিনের ৯০% উচ্চতা */
            overflow: hidden;
            position: relative;
            border: none;
        }

        /* গুগল শীট আইফ্রেম টিউনআপ */
        .sheet-container iframe {
            position: absolute;
            top: -75px; /* উপরের মেনু বার লুকানোর জন্য */
            left: 0;
            width: 100%;
            height: calc(100% + 75px); /* মেনু কাটলে হাইট অ্যাডজাস্ট করা */
            border: none;
        }

        .header-bar { background: #800000; color: white; padding: 15px; text-align: center; font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-overlay" class="login-overlay">
        <div class="login-box">
            <h2>বাকি হিসাব ৩.০</h2>
            <input type="text" id="userid" placeholder="ইউজার আইডি">
            <input type="password" id="pass" placeholder="পাসওয়ার্ড">
            <button onclick="validate()">লগইন করুন</button>
            <p id="err" style="color: red; display: none; font-size: 14px; margin-top: 10px;">ভুল তথ্য দিয়েছেন!</p>
        </div>
    </div>

    <div id="main-dashboard">
        <div class="header-bar">লাইভ হিসাব রিপোর্ট - বাকি হিসাব ৩.০</div>
        
        <div class="sheet-container">
            <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vTGAqWU1mMKBzWoPMrF6HYgeOcafMWRFItRQH53QxwTKKiDTrnpBST0WwvQnJShzSpNTCY6Bl5m6FmY/pubhtml?chrome=false&amp;widget=false&amp;headers=false&amp;gridlines=false"></iframe>
        </div>
        
        <div style="text-align: center; padding: 20px;">
            <button onclick="location.reload()" style="width: auto; padding: 10px 30px; background: #333;">লগ আউট</button>
        </div>
    </div>

    <script>
        function validate() {
            var u = document.getElementById('userid').value;
            var p = document.getElementById('pass').value;
            // আপনার দেওয়া পাসওয়ার্ড: 66850
            if(u === "admin" && p === "66850") {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-dashboard').style.display = 'block';
            } else {
                document.getElementById('err').style.display = 'block';
            }
        }
    </script>

</body>
</html>
