<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>বাকি হিসাব ৩.০ - লগইন</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .login-box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        .login-box h2 { color: #800000; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #800000; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { background-color: #a00000; }
        #content-area { display: none; width: 100%; max-width: 1000px; margin: 20px; text-align: center; }
        .iframe-container { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; position: relative; }
        .section-title { background: #800000; color: white; padding: 10px; margin: 0; font-size: 18px; }
        iframe { border: none; width: 100%; height: 500px; }
    </style>
</head>
<body>

    <div id="login-form" class="login-box">
        <h2>বাকি হিসাব ৩.০</h2>
        <input type="text" id="userid" placeholder="ইউজার আইডি">
        <input type="password" id="pass" placeholder="পাসওয়ার্ড">
        <button onclick="checkLogin()">লগইন করুন</button>
        <p id="msg" style="color: red; display: none; margin-top: 10px;">ভুল আইডি বা পাসওয়ার্ড!</p>
    </div>

    <div id="content-area">
        <h2 style="color: #800000;">ড্যাশবোর্ড - বাকি হিসাব ৩.০</h2>
        
        <div class="iframe-container">
            <p class="section-title">তথ্য এন্ট্রি ও রিপোর্ট</p>
            <iframe src="https://script.google.com/macros/s/AKfycbyz90ERoZ4ThdAzUZuPq8BrrHH8eeLxmggfSrXlPJdnhACwNEOa5jlE8eFus0YYWPuO/exec"></iframe>
        </div>

        <div class="iframe-container">
            <p class="section-title">লাইভ হিসাব তালিকা</p>
            <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vTGAqWU1mMKBzWoPMrF6HYgeOcafMWRFItRQH53QxwTKKiDTrnpBST0WwvQnJShzSpNTCY6Bl5m6FmY/pubhtml?chrome=false&amp;widget=true&amp;headers=false"></iframe>
        </div>
        
        <button onclick="location.reload()" style="max-width: 150px; margin-top: 20px;">লগ আউট</button>
    </div>

    <script>
        function checkLogin() {
            var id = document.getElementById('userid').value;
            var p = document.getElementById('pass').value;

            // আপনার দেওয়া আইডি ও পাসওয়ার্ড
            if (id === "admin" && p === "66850") {
                document.getElementById('login-form').style.display = 'none';
                document.getElementById('content-area').style.display = 'block';
                document.body.style.display = 'block'; // কন্টেন্ট বড় হলে স্ক্রল করার জন্য
            } else {
                document.getElementById('msg').style.display = 'block';
            }
        }
    </script>

</body>
</html>
